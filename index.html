
<!DOCTYPE html>
<html>
<head>
    <title>🎮 3‑Game Combo</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #a8d8ff, #d4f1ff);
            text-align: center;
            padding-top: 40px;
        }
        h1 { font-size: 40px; }
        h2 { font-size: 30px; }

        .hidden { display: none; }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        button:hover { transform: scale(1.1); }

        .menuBtn { background: #4aa3ff; }
        .clickBtn { background: #ff6b6b; }
        .reactBtn { background: #ffd166; color: #333; }
        .snakeBtn { background: #06d6a0; }

        #box {
            width: 300px;
            height: 200px;
            background: red;
            margin: 30px auto;
            border-radius: 12px;
            display: none;
            cursor: pointer;
        }

        canvas {
            background: white;
            border: 3px solid #003049;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>🎮 Mini Game Pack</h1>

<!-- MENU -->
<div id="menu">
    <h2>Select a Game</h2>
    <button class="menuBtn" onclick="showClicker()">🖱️ Clicker</button>
    <button class="menuBtn" onclick="showReaction()">⚡ Reaction Time</button>
    <button class="menuBtn" onclick="showSnake()">🐍 Snake</button>
</div>

<!-- CLICKER GAME -->
<div id="clicker" class="hidden">
    <h2>🖱️ Clicker Game</h2>
    <p>Clicks: <span id="count">0</span></p>
    <button class="clickBtn" onclick="addClick()">CLICK ME 🔥</button>
    <br><br>
    <button class="menuBtn" onclick="goHome()">⬅ Back</button>
</div>

<!-- REACTION TIME GAME -->
<div id="reaction" class="hidden">
    <h2>⚡ Reaction Time</h2>
    <p id="reactText">Click Start and wait for green.</p>
    <button class="reactBtn" onclick="startReaction()">Start ▶️</button>
    <div id="box" onclick="stopReaction()"></div>
    <br>
    <button class="menuBtn" onclick="goHome()">⬅ Back</button>
</div>

<!-- SNAKE GAME -->
<div id="snake" class="hidden">
    <h2>🐍 Snake Game</h2>
    <p>Score: <span id="snakeScore">0</span></p>
    <canvas id="game" width="400" height="400"></canvas>
    <br>
    <button class="snakeBtn" onclick="startSnake()">Start ▶️</button>
    <br><br>
    <button class="menuBtn" onclick="goHome()">⬅ Back</button>
</div>

<script>
/* MENU NAVIGATION */
function goHome() {
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("clicker").classList.add("hidden");
    document.getElementById("reaction").classList.add("hidden");
    document.getElementById("snake").classList.add("hidden");
}

function showClicker() {
    clicks = 0;
    document.getElementById("count").innerText = 0;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("clicker").classList.remove("hidden");
}

function showReaction() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("reaction").classList.remove("hidden");
}

function showSnake() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("snake").classList.remove("hidden");
}

/* CLICKER GAME */
let clicks = 0;
function addClick() {
    clicks++;
    document.getElementById("count").innerText = clicks;
}

/* REACTION TIME GAME */
let startTime, timeout;

function startReaction() {
    document.getElementById("reactText").innerText = "⏳ Wait for green...";
    let box = document.getElementById("box");
    box.style.display = "none";
    box.style.background = "red";

    let delay = Math.random() * 3000 + 1000;

    timeout = setTimeout(() => {
        box.style.display = "block";
        box.style.background = "lightgreen";
        startTime = Date.now();
    }, delay);
}

function stopReaction() {
    let box = document.getElementById("box");
    if (box.style.background !== "lightgreen") return;

    let reaction = Date.now() - startTime;
    document.getElementById("reactText").innerText = "⚡ Reaction Time: " + reaction + " ms";

    clearTimeout(timeout);
}

/* SNAKE GAME */
let x, y, vx, vy, speed, trail, tail, foodX, foodY;
let running = false;

function startSnake() {
    x = 10; y = 10;
    vx = 1; vy = 0;
    speed = 7;
    trail = [];
    tail = 5;
    foodX = Math.floor(Math.random() * 20);
    foodY = Math.floor(Math.random() * 20);
    document.getElementById("snakeScore").innerText = 0;

    if (!running) {
        running = true;
        requestAnimationFrame(updateSnake);
    }
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp" && vy !== 1) { vx = 0; vy = -1; }
    if (e.key === "ArrowDown" && vy !== -1) { vx = 0; vy = 1; }
    if (e.key === "ArrowLeft" && vx !== 1) { vx = -1; vy = 0; }
    if (e.key === "ArrowRight" && vx !== -1) { vx = 1; vy = 0; }
});

function updateSnake() {
    let canvas = document.getElementById("game");
    let ctx = canvas.getContext("2d");

    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, 400, 400);

    x += vx;
    y += vy;

    if (x < 0 || x > 19 || y < 0 || y > 19) {
        running = false;
        alert("Game Over! Score: " + (tail - 5));
        return;
    }

    ctx.fillStyle = "#ff6b6b";
    ctx.fillRect(foodX * 20, foodY * 20, 20, 20);

    ctx.fillStyle = "#06d6a0";
    for (let i = 0; i < trail.length; i++) {
        ctx.fillRect(trail[i].x * 20, trail[i].y * 20, 20, 20);
        if (trail[i].x === x && trail[i].y === y) {
            running = false;
            alert("Game Over! Score: " + (tail - 5));
            return;
        }
    }

    trail.push({x, y});
    while (trail.length > tail) trail.shift();

    if (x === foodX && y === foodY) {
        tail++;
        speed += 0.3;
        document.getElementById("snakeScore").innerText = tail - 5;
        foodX = Math.floor(Math.random() * 20);
        foodY = Math.floor(Math.random() * 20);
    }

    setTimeout(() => requestAnimationFrame(updateSnake), 1000 / speed);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hey...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #89cff0, #ffe4b5);
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      max-width: 400px;
    }
    button {
      margin-top: 25px;
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #357ac9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>I just wanted to say something...</h1>
    <p>But I need you to go to the next page first.</p>
    <button onclick="location.href='page2.html'">Next ➜</button>
  </div>
</body>
</html>

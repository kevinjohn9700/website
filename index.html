<!DOCTYPE html>
<html>
<head>
    <title>Send Anonymous Message</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            padding: 40px;
            text-align: center;
        }
        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Send Me an Anonymous Message</h1>

    <form action="/send" method="POST" onsubmit="sent()">
        <textarea name="message" placeholder="Type your message..." required></textarea>
        <br>
        <button type="submit">Send</button>
    </form>

    <div id="status"></div>

<script>
function sent() {
    document.getElementById("status").innerText = "Message sent!";
}
</script>

</body>
</html>

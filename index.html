<!DOCTYPE html>
<html>
<head>
    <title>🎮 Ultimate Mini Game Arcade</title>
    <style>
        body {
            font-family: "Trebuchet MS", Arial;
            background: linear-gradient(135deg, #a8d8ff, #d4f1ff);
            color: #003049;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 45px;
            text-shadow: 2px 2px #00000020;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .hidden { display: none; }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 22px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: 0.2s;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
            filter: brightness(1.15);
        }

        /* Button colours */
        #menu button { background: #4aa3ff; }
        #clicker button { background: #ff6b6b; }
        #reaction button { background: #ffd166; color: #333; }
        #snake button { background: #06d6a0; }
        #aim button { background: #ff6b6b; }
        #leaderboardScreen button { background: #4aa3ff; }

        input {
            padding: 12px;
            font-size: 20px;
            width: 260px;
            border-radius: 10px;
            border: none;
            text-align: center;
        }

        #box {
            width: 300px;
            height: 200px;
            background: #ff4d4d;
            margin: 30px auto;
            display: none;
            border-radius: 15px;
            transition: 0.2s;
        }

        #leaderboard {
            margin-top: 20px;
            text-align: left;
            display: inline-block;
            background: #ffffff80;
            padding: 20px;
            border-radius: 12px;
            color: #003049;
        }

        ul {
            list-style: none;
            padding: 0;
            font-size: 20px;
        }

        canvas {
            background: #ffffff;
            border: 3px solid #003049;
            border-radius: 10px;
            margin-top: 20px;
        }

        #aimArea {
            width: 350px;
            height: 350px;
            background: #ffffff;
            border: 3px solid #003049;
            border-radius: 10px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }

        .target {
            position: absolute;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎮 Ultimate Mini Game Arcade</h1>

    <!-- NAME INPUT -->
    <div id="nameScreen">
        <h2>👤 Enter your name</h2>
        <input id="playerName" placeholder="Your name">
        <br><br>
        <button onclick="saveName()">Continue ➡️</button>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="hidden">
        <h2>✨ Choose a Game ✨</h2>
        <button onclick="showClicker()">🖱️ Clicker Game</button>
        <button onclick="showReaction()">⚡ Reaction Time</button>
        <button onclick="showSnake()">🐍 Snake Game</button>
        <button onclick="showAim()">🎯 Aim Trainer</button>
        <button onclick="showLeaderboard()">🏆 Leaderboard</button>
    </div>

    <!-- CLICKER GAME -->
    <div id="clicker" class="hidden">
        <h2>🖱️ Clicker Game</h2>
        <p>Clicks: <span id="count">0</span></p>
        <button onclick="addClick()">🔥 CLICK ME 🔥</button>
        <br><br>
        <button onclick="finishClicker()">Save Score 💾</button>
        <br><br>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

    <!-- REACTION TIME GAME -->
    <div id="reaction" class="hidden">
        <h2>⚡ Reaction Time Test</h2>
        <p id="reactionText">Click "Start" and wait for the box to turn green.</p>
        <button onclick="startReaction()">Start ▶️</button>

        <div id="box" onclick="stopReaction()"></div>

        <br>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

    <!-- SNAKE GAME -->
    <div id="snake" class="hidden">
        <h2>🐍 Snake Game</h2>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
        <p>Score: <span id="snakeScore">0</span></p>
        <button onclick="startSnake()">Start ▶️</button>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

    <!-- AIM TRAINER -->
    <div id="aim" class="hidden">
        <h2>🎯 Advanced Aim Trainer</h2>
        <p>Time: <span id="aimTime">10</span>s | Hits: <span id="aimHits">0</span> | Misses: <span id="aimMiss">0</span></p>
        <p>Accuracy: <span id="aimAcc">100</span>% | Combo: <span id="aimCombo">0</span></p>
        <div id="aimArea"></div>
        <button onclick="startAim()">Start ▶️</button>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboardScreen" class="hidden">
        <h2>🏆 Leaderboard</h2>
        <div id="leaderboard"></div>
        <br>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

<script>
/* GLOBAL VARIABLES */
let player = "";
let clicks = 0;
let startTime, timeout;

/* SAVE NAME */
function saveName() {
    player = document.getElementById("playerName").value.trim();
    if (player === "") return alert("Enter a name!");

    document.getElementById("nameScreen").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

/* MENU NAVIGATION */
function goHome() {
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("clicker").classList.add("hidden");
    document.getElementById("reaction").classList.add("hidden");
    document.getElementById("snake").classList.add("hidden");
    document.getElementById("aim").classList.add("hidden");
    document.getElementById("leaderboardScreen").classList.add("hidden");
}

function showClicker() {
    clicks = 0;
    document.getElementById("count").innerText = clicks;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("clicker").classList.remove("hidden");
}

function showReaction() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("reaction").classList.remove("hidden");
}

function showSnake() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("snake").classList.remove("hidden");
}

function showAim() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("aim").classList.remove("hidden");
}

function showLeaderboard() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("leaderboardScreen").classList.remove("hidden");

    let scores = JSON.parse(localStorage.getItem("scores") || "[]");

    let html = "<h3>🖱️ Clicker Scores</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "clicker")
          .sort((a,b) => b.score - a.score)
          .forEach(s => html += `<li>⭐ ${s.name}: ${s.score}</li>`);
    html += "</ul>";

    html += "<h3>⚡ Reaction Time (Lower is better)</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "reaction")
          .sort((a,b) => a.score - b.score)
          .forEach(s => html += `<li>⏱️ ${s.name}: ${s.score} ms</li>`);
    html += "</ul>";

    html += "<h3>🐍 Snake Scores</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "snake")
          .sort((a,b) => b.score - a.score)
          .forEach(s => html += `<li>🐍 ${s.name}: ${s.score}</li>`);
    html += "</ul>";

    html += "<h3>🎯 Aim Trainer Scores</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "aim")
          .sort((a,b) => b.score - a.score)
          .forEach(s => html += `<li>🎯 ${s.name}: ${s.score}</li>`);
    html += "</ul>";

    document.getElementById("leaderboard").innerHTML = html;
}

/* CLICKER GAME */
function addClick() {
    clicks++;
    document.getElementById("count").innerText = clicks;
}

function finishClicker() {
    saveScore("clicker", clicks);
    alert("Score saved! 🎉");
    goHome();
}

/* REACTION GAME */
function startReaction() {
    document.getElementById("reactionText").innerText = "⏳ Wait for green...";
    document.getElementById("box").style.display = "none";
    document.getElementById("box").style.background = "#ff4d4d";

    let delay = Math.random() * 3000 + 1000;

    timeout = setTimeout(() => {
        document.getElementById("box").style.display = "block";
        document.getElementById("box").style.background = "lightgreen";
        startTime = Date.now();
    }, delay);
}

function stopReaction() {
    if (document.getElementById("box").style.background !== "lightgreen") return;

    let reactionTime = Date.now() - startTime;
    document.getElementById("reactionText").innerText =
        "⚡ Your reaction time: " + reactionTime + " ms";

    saveScore("reaction", reactionTime);
    clearTimeout(timeout);
}

/* SAVE SCORE */
function saveScore(game, score) {
    let scores = JSON.parse(localStorage.getItem("scores") || "[]");

    scores.push({
        name: player,
        game: game,
        score: score
    });

    localStorage.setItem("scores", JSON.stringify(scores));
}

/* 🐍 SNAKE GAME ENGINE   */

let snakeX, snakeY, snakeSpeed, snakeVX, snakeVY, snakeTrail, snakeTail, foodX, foodY;
let snakeRunning = false;

function startSnake() {
    snakeX = 10;
    snakeY = 10;
    snakeVX = 1;
    snakeVY = 0;
    snakeSpeed = 7;
    snakeTrail = [];
    snakeTail = 5;
    foodX = Math.floor(Math.random() * 20);
    foodY = Math.floor(Math.random() * 20);
    document.getElementById("snakeScore").innerText = 0;

    if (!snakeRunning) {
        snakeRunning = true;
        requestAnimationFrame(updateSnake);
    }
}

document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowUp" && snakeVY !== 1) { snakeVX = 0; snakeVY = -1; }
    if (e.key === "ArrowDown" && snakeVY !== -1) { snakeVX = 0; snakeVY = 1; }
    if (e.key === "ArrowLeft" && snakeVX !== 1) { snakeVX = -1; snakeVY = 0; }
    if (e.key === "ArrowRight" && snakeVX !== -1) { snakeVX = 1; snakeVY = 0; }
});

function updateSnake() {
    let canvas = document.getElementById("snakeCanvas");
    let ctx = canvas.getContext("2d");

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    snakeX += snakeVX;
    snakeY += snakeVY;

    if (snakeX < 0 || snakeX > 19 || snakeY < 0 || snakeY > 19) {
        snakeGameOver();
        return;
    }

    ctx.fillStyle = "#ff6b6b";
    ctx.fillRect(foodX * 20, foodY * 20, 20, 20);

    ctx.fillStyle = "#06d6a0";
    for (let i = 0; i < snakeTrail.length; i++) {
        ctx.fillRect(snakeTrail[i].x * 20, snakeTrail[i].y * 20, 20, 20);

        if (snakeTrail[i].x === snakeX && snakeTrail[i].y === snakeY) {
            snakeGameOver();
            return;
        }
    }

    snakeTrail.push({x: snakeX, y: snakeY});
    while (snakeTrail.length > snakeTail) snakeTrail.shift();

    if (snakeX === foodX && snakeY === foodY) {
        snakeTail++;
        snakeSpeed += 0.3;
        document.getElementById("snakeScore").innerText = snakeTail - 5;

        foodX = Math.floor(Math.random() * 20);
        foodY = Math.floor(Math.random() * 20);
    }

    setTimeout(() => requestAnimationFrame(updateSnake), 1000 / snakeSpeed);
}

function snakeGameOver() {
    snakeRunning = false;
    let score = snakeTail - 5;
    saveScore("snake", score);
    alert("Game Over! Your score: " + score);
}

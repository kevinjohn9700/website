<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>For You 💌</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #89cff0, #ffb6c1);
      font-family: Arial, sans-serif;
    }
    .card {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 26px;
      color: #333;
    }
    p {
      margin: 10px 0 25px;
      font-size: 16px;
      color: #555;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .yes {
      background-color: #4caf50;
      color: #fff;
      box-shadow: 0 4px 10px rgba(76,175,80,0.4);
    }
    .no {
      background-color: #f44336;
      color: #fff;
      box-shadow: 0 4px 10px rgba(244,67,54,0.4);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
    }
    #answer {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hey… I have a question 🥺</h1>
    <p>
      I really like you, and I’ve been wanting to ask you this for a while…
      <br><br>
      Will you be my partner? 💖
    </p>
    <div class="buttons">
      <button class="yes" onclick="sayYes()">Yes</button>
      <button class="no" onclick="sayNo()">No</button>
    </div>
    <div id="answer"></div>
  </div>

  <script>
    function sayYes() {
      document.getElementById('answer').textContent =
        "You just made me the happiest person ever 💕";
    }
    function sayNo() {
      document.getElementById('answer').textContent =
        "That’s okay. I’m still really glad I got to tell you how I feel 💛";
    }
  </script>
</body>
</html>

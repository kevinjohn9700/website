<!DOCTYPE html>
<html>
<head>
    <title>Mini Game Hub</title>
    <style>
        body {
            font-family: Arial;
            background: #222;
            color: white;
            text-align: center;
            padding: 40px;
        }
        .hidden { display: none; }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
        }
        #menu button { background: #4CAF50; color: white; }
        #clicker button { background: #2196F3; color: white; }
        #reaction button { background: #FF5722; color: white; }
        #box {
            width: 300px;
            height: 200px;
            background: red;
            margin: 30px auto;
            display: none;
            border-radius: 10px;
        }
        input {
            padding: 10px;
            font-size: 18px;
            width: 250px;
            margin-bottom: 20px;
        }
        #leaderboard {
            margin-top: 30px;
            text-align: left;
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>🎮 Mini Game Hub</h1>

    <!-- NAME INPUT -->
    <div id="nameScreen">
        <h2>Enter your name</h2>
        <input id="playerName" placeholder="Your name">
        <br>
        <button onclick="saveName()">Continue</button>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="hidden">
        <h2>Select a Game</h2>
        <button onclick="showClicker()">Clicker Game</button>
        <button onclick="showReaction()">Reaction Time</button>
        <button onclick="showLeaderboard()">Leaderboard</button>
    </div>

    <!-- CLICKER GAME -->
    <div id="clicker" class="hidden">
        <h2>Clicker Game</h2>
        <p>Clicks: <span id="count">0</span></p>
        <button onclick="addClick()">Click Me!</button>
        <br><br>
        <button onclick="finishClicker()">Finish & Save Score</button>
        <br><br>
        <button onclick="goHome()">Back</button>
    </div>

    <!-- REACTION TIME GAME -->
    <div id="reaction" class="hidden">
        <h2>Reaction Time Test</h2>
        <p id="reactionText">Click "Start" and wait for the box to turn green.</p>
        <button onclick="startReaction()">Start</button>

        <div id="box" onclick="stopReaction()"></div>

        <br>
        <button onclick="goHome()">Back</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboardScreen" class="hidden">
        <h2>🏆 Leaderboard</h2>
        <div id="leaderboard"></div>
        <br>
        <button onclick="goHome()">Back</button>
    </div>

<script>
/* GLOBAL VARIABLES */
let player = "";
let clicks = 0;
let startTime, timeout;

/* SAVE NAME */
function saveName() {
    player = document.getElementById("playerName").value.trim();
    if (player === "") return alert("Enter a name!");

    document.getElementById("nameScreen").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

/* MENU NAVIGATION */
function goHome() {
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("clicker").classList.add("hidden");
    document.getElementById("reaction").classList.add("hidden");
    document.getElementById("leaderboardScreen").classList.add("hidden");
}

function showClicker() {
    clicks = 0;
    document.getElementById("count").innerText = clicks;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("clicker").classList.remove("hidden");
}

function showReaction() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("reaction").classList.remove("hidden");
}

function showLeaderboard() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("leaderboardScreen").classList.remove("hidden");

    let scores = JSON.parse(localStorage.getItem("scores") || "[]");

    let html = "<h3>Clicker Scores</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "clicker")
          .sort((a,b) => b.score - a.score)
          .forEach(s => html += `<li>${s.name}: ${s.score}</li>`);
    html += "</ul>";

    html += "<h3>Reaction Time (Lower is better)</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "reaction")
          .sort((a,b) => a.score - b.score)
          .forEach(s => html += `<li>${s.name}: ${s.score} ms</li>`);
    html += "</ul>";

    document.getElementById("leaderboard").innerHTML = html;
}

/* CLICKER GAME */
function addClick() {
    clicks++;
    document.getElementById("count").innerText = clicks;
}

function finishClicker() {
    saveScore("clicker", clicks);
    alert("Score saved!");
    goHome();
}

/* REACTION GAME */
function startReaction() {
    document.getElementById("reactionText").innerText = "Wait for green...";
    document.getElementById("box").style.display = "none";
    document.getElementById("box").style.background = "red";

    let delay = Math.random() * 3000 + 1000;

    timeout = setTimeout(() => {
        document.getElementById("box").style.display = "block";
        document.getElementById("box").style.background = "green";
        startTime = Date.now();
    }, delay);
}

function stopReaction() {
    if (document.getElementById("box").style.background !== "green") return;

    let reactionTime = Date.now() - startTime;
    document.getElementById("reactionText").innerText =
        "Your reaction time: " + reactionTime + " ms";

    saveScore("reaction", reactionTime);
    clearTimeout(timeout);
}

/* SAVE SCORE TO LOCAL STORAGE */
function saveScore(game, score) {
    let scores = JSON.parse(localStorage.getItem("scores") || "[]");

    scores.push({
        name: player,
        game: game,
        score: score
    });

    localStorage.setItem("scores", JSON.stringify(scores));
}
</script>

</body>
</html>

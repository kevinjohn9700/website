<!DOCTYPE html>
<html>
<head>
    <title>🎮 Mini Game Hub</title>
    <style>
        body {
            font-family: "Trebuchet MS", Arial;
            background: linear-gradient(135deg, #a8d8ff, #d4f1ff); /* Light blue gradient */
            color: #003049;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 45px;
            text-shadow: 2px 2px #00000020;
        }

        h2 {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .hidden { display: none; }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 22px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: 0.2s;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
            filter: brightness(1.15);
        }

        /* Button colours */
        #menu button { background: #4aa3ff; }       /* Light blue */
        #clicker button { background: #ff6b6b; }    /* Light red */
        #reaction button { background: #ffd166; color: #333; } /* Light yellow */
        #leaderboardScreen button { background: #06d6a0; } /* Light green */

        input {
            padding: 12px;
            font-size: 20px;
            width: 260px;
            border-radius: 10px;
            border: none;
            text-align: center;
        }

        #box {
            width: 300px;
            height: 200px;
            background: #ff4d4d;
            margin: 30px auto;
            display: none;
            border-radius: 15px;
            transition: 0.2s;
        }

        #leaderboard {
            margin-top: 20px;
            text-align: left;
            display: inline-block;
            background: #ffffff80;
            padding: 20px;
            border-radius: 12px;
            color: #003049;
        }

        ul {
            list-style: none;
            padding: 0;
            font-size: 20px;
        }

        li {
            margin: 5px 0;
            padding: 5px;
        }
    </style>
</head>
<body>

    <h1>🎮 Mini Game Hub</h1>

    <!-- NAME INPUT -->
    <div id="nameScreen">
        <h2>👤 Enter your name</h2>
        <input id="playerName" placeholder="Your name">
        <br><br>
        <button onclick="saveName()">Continue ➡️</button>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="hidden">
        <h2>✨ Choose a Game ✨</h2>
        <button onclick="showClicker()">🖱️ Clicker Game</button>
        <button onclick="showReaction()">⚡ Reaction Time</button>
        <button onclick="showLeaderboard()">🏆 Leaderboard</button>
    </div>

    <!-- CLICKER GAME -->
    <div id="clicker" class="hidden">
        <h2>🖱️ Clicker Game</h2>
        <p>Clicks: <span id="count">0</span></p>
        <button onclick="addClick()">🔥 CLICK ME 🔥</button>
        <br><br>
        <button onclick="finishClicker()">Save Score 💾</button>
        <br><br>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

    <!-- REACTION TIME GAME -->
    <div id="reaction" class="hidden">
        <h2>⚡ Reaction Time Test</h2>
        <p id="reactionText">Click "Start" and wait for the box to turn green.</p>
        <button onclick="startReaction()">Start ▶️</button>

        <div id="box" onclick="stopReaction()"></div>

        <br>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboardScreen" class="hidden">
        <h2>🏆 Leaderboard</h2>
        <div id="leaderboard"></div>
        <br>
        <button onclick="goHome()">⬅️ Back</button>
    </div>

<script>
/* GLOBAL VARIABLES */
let player = "";
let clicks = 0;
let startTime, timeout;

/* SAVE NAME */
function saveName() {
    player = document.getElementById("playerName").value.trim();
    if (player === "") return alert("Enter a name!");

    document.getElementById("nameScreen").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
}

/* MENU NAVIGATION */
function goHome() {
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("clicker").classList.add("hidden");
    document.getElementById("reaction").classList.add("hidden");
    document.getElementById("leaderboardScreen").classList.add("hidden");
}

function showClicker() {
    clicks = 0;
    document.getElementById("count").innerText = clicks;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("clicker").classList.remove("hidden");
}

function showReaction() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("reaction").classList.remove("hidden");
}

function showLeaderboard() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("leaderboardScreen").classList.remove("hidden");

    let scores = JSON.parse(localStorage.getItem("scores") || "[]");

    let html = "<h3>🖱️ Clicker Scores</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "clicker")
          .sort((a,b) => b.score - a.score)
          .forEach(s => html += `<li>⭐ ${s.name}: ${s.score}</li>`);
    html += "</ul>";

    html += "<h3>⚡ Reaction Time (Lower is better)</h3>";
    html += "<ul>";
    scores.filter(s => s.game === "reaction")
          .sort((a,b) => a.score - b.score)
          .forEach(s => html += `<li>⏱️ ${s.name}: ${s.score} ms</li>`);
    html += "</ul>";

    document.getElementById("leaderboard").innerHTML = html;
}

/* CLICKER GAME */
function addClick() {
    clicks++;
    document.getElementById("count").innerText = clicks;
}

function finishClicker() {
    saveScore("clicker", clicks);
    alert("Score saved! 🎉");
    goHome();
}

/* REACTION GAME */
function startReaction() {
    document.getElementById("reactionText").innerText = "⏳ Wait for green...";
    document.getElementById("box").style.display = "none";
    document.getElementById("box").style.background = "#ff4d4d";

    let delay = Math.random() * 3000 + 1000;

    timeout = setTimeout(() => {
        document.getElementById("box").style.display = "block";
        document.getElementById("box").style.background = "lightgreen";
        startTime = Date.now();
    }, delay);
}

function stopReaction() {
    if (document.getElementById("box").style.background !== "lightgreen") return;

    let reactionTime = Date.now() - startTime;
    document.getElementById("reactionText").innerText =
        "⚡ Your reaction time: " + reactionTime + " ms";

    saveScore("reaction", reactionTime);
    clearTimeout(timeout);
}

/* SAVE SCORE */
function saveScore(game, score) {
    let scores = JSON.parse(localStorage.getItem("scores") || "[]");

    scores.push({
        name: player,
        game: game,
        score: score
    });

    localStorage.setItem("scores", JSON.stringify(scores));
}
</script>

</body>
</html>

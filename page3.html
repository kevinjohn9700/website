<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You 💌</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffb6c1, #89cff0);
      font-family: Arial, sans-serif;
    }
    .card {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 400px;
      position: relative;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 26px;
      color: #333;
    }
    p {
      margin: 10px 0 25px;
      font-size: 16px;
      color: #555;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      position: relative;
    }
    button {
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }
    .yes {
      background-color: #4caf50;
      color: #fff;
      box-shadow: 0 4px 10px rgba(76,175,80,0.4);
    }
    .no {
      background-color: #f44336;
      color: #fff;
      box-shadow: 0 4px 10px rgba(244,67,54,0.4);
      position: absolute;
    }
    #answer {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>So... here it is 🥺</h1>
    <p>I really like you.  
    And I want to ask you something...</p>
    <p><strong>Will you be my partner? 💖</strong></p>

    <div class="buttons">
      <button class="yes" onclick="sayYes()">Yes</button>
      <button class="no" id="noBtn">No</button>
    </div>

    <div id="answer"></div>
  </div>

  <script>
    function sayYes() {
      document.getElementById('answer').textContent =
        "You just made me the happiest person ever 💕";
    }

    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
      const card = document.querySelector(".card");
      const cardRect = card.getBoundingClientRect();

      const x = Math.random() * (cardRect.width - 80);
      const y = Math.random() * (cardRect.height - 40);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });
  </script>
</body>
</html>
